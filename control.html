<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Control Partido</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>⚽ Control Partido</h1>

  <div class="control-container">

    <div class="selectors">

      <div class="select-box">
        <label>Equipo 1</label>
        <select id="team1"></select>
      </div>

      <div class="select-box">
        <label>Equipo 2</label>
        <select id="team2"></select>
      </div>

    </div>

    <div class="timer" id="timer">
      20:00
    </div>
<div class="timer" id="timer"></div>

<button id="startBtn" class="save-btn">
  Iniciar partido
</button>

<button id="resetTimerBtn" class="reset-btn">
  Reiniciar tiempo
</button>
    <div class="scoreboard">

      <div class="team-box">

        <h2 id="team1Name">Equipo 1</h2>

        <div class="score-controls">

          <button class="minus" id="minus1">−</button>

          <span id="score1">0</span>

          <button class="plus" id="plus1">+</button>

        </div>

      </div>

      <div class="team-box">

        <h2 id="team2Name">Equipo 2</h2>

        <div class="score-controls">

          <button class="minus" id="minus2">−</button>

          <span id="score2">0</span>

          <button class="plus" id="plus2">+</button>

        </div>

      </div>

    </div>

    <div class="cooperative-section">

      <div>
        <label>Cooperativos Equipo 1</label>
        <input type="number" id="coop1" value="0">
      </div>

      <div>
        <label>Cooperativos Equipo 2</label>
        <input type="number" id="coop2" value="0">
      </div>

    </div>

    <button id="saveBtn" class="save-btn">
      Guardar Resultado
    </button>

    <button id="resetBtn" class="reset-btn">
      Reiniciar Torneo
    </button>

  </div>

  <script type="module" src="control.js"></script>

</body>
</html>
